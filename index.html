<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAfeLTKRQ66tjZjAt7tg6KcrWhtmv0y3fo", databaseURL: "https://berkah-baja-steel-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "berkah-baja-steel" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbKey = "Surat Jalan";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyZhTJrSLlzeV8DyC1NcZciJyUrTLzMff5UahkTpZcDuF6PPX2o4E9Pc2K_guOhMjEh/exec";

    }

    // --- FUNGSI DURASI ---
    function hitungDurasi(jamM, jamB) {
        if(!jamM || !jamB) return "-";
        
        const jM = jamM.replace('.', ':');
        const jB = jamB.replace('.', ':');
        
        const [h1, m1] = jM.split(':').map(Number);
        const [h2, m2] = jB.split(':').map(Number);
        
        if (isNaN(h1) || isNaN(m1) || isNaN(h2) || isNaN(m2)) return "-";

        let totalMenit = (h2 * 60 + m2) - (h1 * 60 + m1);
        if (totalMenit < 0) totalMenit += 1440; 
        
        const jam = Math.floor(totalMenit / 60);
        const mnt = totalMenit % 60;
        
        return `${jam} jam ${mnt} menit`;
    }

    async function compressAndGetBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 800;
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL("image/jpeg", 0.7).split(',')[1]);
                };
            };
        });
    }

    async function uploadFoto(file, fileName) {
        if(!file) return "";
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('load-txt').innerText = "MENYUSUTKAN FOTO...";
        const base64Sut = await compressAndGetBase64(file);
        document.getElementById('load-txt').innerText = "MENGIRIM DATA (" + fileName.split('_')[0] + ")...";
        try {
            const res = await fetch(GAS_URL, { 
                method: "POST", 
                body: JSON.stringify({ base64: base64Sut, type: "image/jpeg", name: fileName }) 
            });
            const json = await res.json();
            return json.url || "";
        } catch (err) {
            console.error("Gagal Upload:", err);
            return "";
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

  async function printSuratJalan(data) {

    printArea.style = "width: 380px; padding: 20px; background: white; color: black; font-family: monospace; position: absolute; left: -9999px; top: 0;";
    printArea.innerHTML = `

    <div style="text-align: center; font-size: 12px; font-weight: bold;">SUPLAY MATERIAL PROJECT ${data.project || "LOSARANG"}</div>

                <tr>
                    <td colspan="3" style="padding: 5px 0;">
                        -----------------------------------------------<br>
                        panjang : ${data.p||0} ‖ lebar : ${data.l||0} ‖ tinggi : ${data.t||0} (m)<br>
                        -----------------------------------------------
                    </td>
                </tr>

                <tr><td>TOTAL</td><td>:</td><td><b>${data.volM || 0} M3</b></td></tr>
            </table>

            <div style="text-align: center; margin-top: 5px;">ID SURAT: ${data.id}</div>
            <div id="qrcode-box" style="display: flex; justify-content: center; padding: 10px;"></div>
            -----------------------------------------------<br>

            <table style="width: 100%; font-family: monospace; font-size: 11px; text-align: center;">
                <tr>
                    <td style="width: 50%;"></td>
                    <td>Mengetahui,</td>
                </tr>
                <tr>
                    <td></td>
                    <td style="padding: 5px 0;">
                        <img src="https://raw.githubusercontent.com/yefryZA/SILSILAH-KELUARGA-H.-ZAINAL-ABIDIN/main/Stempel.png" 
                             crossOrigin="anonymous"
                             style="width: 90px; height: auto; display: block; margin: 0 auto;" />
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td><b>SOFYAN</b><br>Supervisor</td>
                </tr>
            </table>
            -----------------------------------------------<br>

            <div style="text-align: center; font-size: 11px; margin-top: 15px;">⚓ NIAT BAIK ‖ KERJA BAIK ‖ REZEKI BAIK ⚓</div>
            <div style="text-align: center; font-size: 10px; margin-top:10px;">Hati-hati Pak Sopir, KELUARGA menunggu ANDA dirumah.</div>
        </div>
    </div>
`;

        document.body.appendChild(printArea);
        
        new QRCode(document.getElementById("qrcode-box"), {
            text: "https://berkahbajasteel.web.app/verifikasi?id=" + data.id,
            width: 150, height: 150
        });

        setTimeout(() => {
            html2canvas(printArea).then(canvas => {
                const imageData = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `STRUK_${data.plat}_${data.id.substring(0,5)}.png`;
                link.href = imageData;
                link.click();
                document.body.removeChild(printArea);
                document.getElementById('load-txt').innerHTML = "<b style='color:green'>STRUK TERDOWNLOAD!</b><br>Buka Galeri & Cetak Gambar.";
                document.getElementById('loader').style.display = 'flex';
                setTimeout(() => { location.reload(); }, 3000);

        }, 1000);
    }

    window.prosesMuat = async () => {
        const p = document.getElementById('m-plat').value.toUpperCase();
        const s = document.getElementById('m-sopir').value.toUpperCase();
        const b = document.getElementById('m-barang').value.toUpperCase();
        const v = document.getElementById('m-vol').value;
        const fS = document.getElementById('m-foto').files[0];
        const fK = document.getElementById('m-ktp').files[0];
        const p_dim = document.getElementById('m-p').value;
        const l_dim = document.getElementById('m-l').value;
        const t_dim = document.getElementById('m-t').value;
        
        // Menangkap data input Project baru dari HTML
        const proj = document.getElementById('m-project').value.toUpperCase();
        
        if(!p || !s || !b || !v || !fS || !fK || !p_dim || !l_dim || !t_dim || !proj) return alert("LENGKAPI SEMUA DATA termasuk PROJECT TUJUAN!");
        
        document.getElementById('load-txt').innerText = "MENYIMPAN DATA...";
        document.getElementById('loader').style.display = 'flex';

        const uS = await uploadFoto(fS, `MUAT_${p}.jpg`);
        const uK = await uploadFoto(fK, `KTP_${p}.jpg`);
        
        const newRef = push(ref(db, `bbs_logs/${dbKey}`));
        const logData = { 
            plat: p, sopir: s, barang: b, 
            project: proj, // Menyimpan parameter nama project ke firebase
            p: Number(p_dim), l: Number(l_dim), t: Number(t_dim),
            volM: Number(v), volB: 0, 
            status: 'MUAT', // LOGIKA BARU: Status awal di-set 'MUAT' agar admin bisa input BOP terlebih dahulu
            fotoM: uS, fotoKTP: uK, 
            tgl: new Date().toLocaleDateString('id-ID'),
            jamM: new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit', hour12: false}) 
        };
        await set(newRef, logData);
        printSuratJalan({ ...logData, id: newRef.key });
    }
    
    let rawData = [];
    let totalOps = 0;

    function getBadgeSelisih(i) {
        const statusMobil = (i.status || "").toUpperCase();
        // Badge selisih disesuaikan agar muncul ketika statusnya sudah OTW atau DONE
        if (statusMobil === 'DONE' || statusMobil === 'OTW') {
            const diff = (i.volB || 0) - (i.volM || 0);
            const warna = diff < 0 ? '#ff4d4d' : '#2ecc71';

async function hitungUang(tb, jumlahMobil = 0) {
    const snapOps = await get(ref(db, `bbs_operasional/${dbKey}`));
    totalOps = 0;
    
    // 1. Ambil elemen list operasional
    const oList = document.getElementById('ops-list'); 
    
    // Cek dulu: Kalau oList ada (hanya di Dashboard Admin), baru jalankan loop operasional
    if(oList) {
        oList.innerHTML = "";
        if(snapOps.val()) {
            Object.keys(snapOps.val()).forEach(k => {
                const o = snapOps.val()[k]; 
                totalOps += Number(o.nom);
                oList.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;"><span>- ${o.ket}</span><span>RP ${o.nom.toLocaleString()} <b onclick="delOps('${k}')" style="color:red; cursor:pointer">X</b></span></div>`;
            });
        }
    } else {
        // Kalau oList nggak ada, kita tetap hitung totalOps dari DB buat PDF
        if(snapOps.val()) {
            Object.values(snapOps.val()).forEach(o => { totalOps += Number(o.nom); });
        }
    }

  // 2. UPDATE TAMPILAN DASHBOARD (Hanya jika ID nya ditemukan)
    const elOps = document.getElementById('d-ops-total');
    if(elOps) {
        elOps.innerText = "RP " + totalOps.toLocaleString();
        
        document.getElementById('res-m5').innerText = "RP " + (tb*0).toLocaleString();
        document.getElementById('res-m5-p').innerText = "/ORG: RP " + Math.floor(h5).toLocaleString();
        
        document.getElementById('res-m7').innerText = "RP " + Math.max(0, (tb*0) - totalOps).toLocaleString();
        document.getElementById('res-m7-p').innerText = "/ORG: RP " + Math.max(0, Math.floor(h7)).toLocaleString() + " (-10%)";
        
        document.getElementById('res-m1').innerText = "RP " + (tb*0).toLocaleString();
        document.getElementById('res-m1-p').innerText = "/ORG: RP " + Math.floor(h1).toLocaleString() + " (-10%)";
        
        const elUnit = document.getElementById('res-unit');
        if(elUnit) {
            elUnit.innerText = "RP " + totalMarginUnit.toLocaleString();
            document.getElementById('res-unit-p').innerText = "/ORG: RP " + Math.floor(hUnit).toLocaleString() + " (-10%)";

window.simpanBopUnit = async () => {
    const firebaseKey = window.currentBopKey;
    if(!firebaseKey) return alert("DATA UNIT TIDAK TERDETEKSI!");

    const matRaw = document.getElementById('ops-material').value;
    const mobRaw = document.getElementById('ops-mobil').value;
    
    const matNom = Number(matRaw.replace(/[^0-9]/g, '')) || 0;
    const mobNom = Number(mobRaw.replace(/[^0-9]/g, '')) || 0;
    const totalBop = matNom + mobNom;

    if(!matNom || !mobNom) {
        return alert("HARAP ISI HARGA MATERIAL DAN ONGKOS MOBIL DENGAN BENAR!");
    }

    try {
        // Simpan rincian BOP langsung ke dalam node mobil terkait
        await update(ref(db, `bbs_logs/${dbKey}/${firebaseKey}`), { 
            bop_material: matNom,
            bop_mobil: mobNom,
            bop_unit: totalBop
        }); 
        alert("BOP 1 UNIT BERHASIL DIKUNCI!"); 
        closeOps();
        location.reload(); 
    } catch (e) {
        alert("Gagal menyimpan BOP: " + e.message);
    }
};

window.prosesTugasSelesai = async () => {
    const firebaseKey = window.currentActiveKey;
    if(!firebaseKey) return alert("TIDAK ADA DATA UNIT YANG TERPILIH!");
    
    const volBongkarInput = document.getElementById('input-vol-bongkar').value;
    const jualRawValue = document.getElementById('input-harga-jual').value;
    const hargaJualInput = Number(jualRawValue.replace(/[^0-9]/g, '')) || 0;
    
    if(!volBongkarInput || !hargaJualInput) {
        return alert("HARAP ISI VOLUME BONGKAR DAN HARGA JUAL KONSUMEN!");
    }
    
    try {
        // 1. Ambil data awal si mobil dari database
        const snap = await get(ref(db, `bbs_logs/${dbKey}/${firebaseKey}`));
        if(!snap.exists()) return alert("Data unit tidak ditemukan!");
        
        const dataMobil = snap.val();
        
        if(!dataMobil.bop_unit) {
            return alert("UNIT INI BELUM MEMILIKI DATA BOP. SELESAIKAN SET BOP TERLEBIH DAHULU!");
        }

        const jamBongkarSkr = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit', hour12: false});
        
        // Hitung margin secara otomatis berdasarkan logika baru
        const totalBopMobil = dataMobil.bop_unit;
        const totalMarginPerUnit = hargaJualInput - totalBopMobil;

        // Gabungkan data inputan baru ke dalam objek mobil untuk dikirim ke fungsi PDF
        dataMobil.volB = Number(volBongkarInput);
        dataMobil.harga_jual = hargaJualInput;
        dataMobil.margin_per_unit = totalMarginPerUnit;
        
        // 2. Update datanya langsung ke database per mobil itu sendiri
        await update(ref(db, `bbs_logs/${dbKey}/${firebaseKey}`), { 
            volB: dataMobil.volB, 
            status: 'OTW', 
            jamB: jamBongkarSkr,
            harga_jual: hargaJualInput,
            margin_per_unit: totalMarginPerUnit
        });
        
        // 3. PANGGIL KODE GENERATE PDF UNTUK 1 UNIT INI
        await window.generatePDF(dataMobil, jamBongkarSkr);
        
        alert("PROSES DATA & CETAK PDF SELESAI!");
        closeOtwManager();

        // 4. LOGIKA BARU: HAPUS PERMANEN DATA DARI DATABASE FIREBASE
        if (confirm("Apakah Anda ingin langsung MENGHAPUS PERMANEN data mobil ini dari database agar tidak menumpuk?")) {
            // Menggunakan fungsi remove() bawaan Firebase untuk menghapus data secara total dan permanen
            await remove(ref(db, `bbs_logs/${dbKey}/${firebaseKey}`));
            alert("DATA MOBIL BERHASIL DIHAPUS PERMANEN DARI FIREBASE!");
        }
        
        location.reload();
    } catch (e) {
        alert("Gagal memproses data: " + e.message);
    }
};

// --- GENERATE PDF TUNGGAL DENGAN DETAIL HARGA JUAL & MARGIN ---
window.generatePDF = async (item, jamBongkarPasti) => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    const vMuat = Number(item.volM) || 0;
    const vBongkar = Number(item.volB) || 0;
    const hitungLossLebih = vBongkar - vMuat;
    
    const bopMat = Number(item.bop_material) || 0;
    const bopMob = Number(item.bop_mobil) || 0;
    const totalBopMobil = Number(item.bop_unit) || 0;
    const hargaJualMobil = Number(item.harga_jual) || 0;
    const marginMobil = Number(item.margin_per_unit) || 0;

    // Header Surat Perusahaan
    doc.setFontSize(14); doc.text("PT. BERKAH BAJA STEEL", 105, 12, { align: "center" });
    doc.setFontSize(9); doc.text(`REKAP SURAT JALAN & LOGISTIK BIAYA BOP [${item.project || 'LOSARANG'}]`, 105, 18, { align: "center" });
    
    const tglJamBongkar = `${item.tgl} || ${jamBongkarPasti || '--:--'}`; 

    // Tabel Atas
    const bodySingle = [[
        1, 
        tglJamBongkar, 
        typeof hitungDurasi === 'function' ? hitungDurasi(item.jamM, jamBongkarPasti) : item.jamM, 
        item.plat, 
        vMuat.toFixed(2), 
        vBongkar.toFixed(2), 
        (hitungLossLebih > 0 ? "+" : "") + hitungLossLebih.toFixed(2)
    ]];

    doc.autoTable({ 
        head: [['NO', 'TGL | JAM BONGKAR', 'DURASI', 'PLAT MOBIL', 'MUAT (M3)', 'BONGKAR (M3)', '+/-']], 
        body: bodySingle, 
        startY: 24, 
        theme: 'grid',
        styles: { fontSize: 8, halign: 'center', cellPadding: 2 },
        headStyles: { fillColor: [41, 128, 185], fontStyle: 'bold' },
        columnStyles: {
            0: { cellWidth: 10 },   
            1: { cellWidth: 40 },  
            2: { cellWidth: 32 },  
            3: { cellWidth: 30 },  
            4: { cellWidth: 24 },  
            5: { cellWidth: 24 },  
            6: { cellWidth: 24 }   
        },
        didDrawCell: (data) => {
            if (data.section === 'body' && data.column.index === 6) {
                const val = data.cell.raw;
                if (val.toString().includes('-')) { 
                    doc.setTextColor(255, 0, 0); 
                    doc.setFont("helvetica", "bold"); 
                } else if (val.toString().includes('+')) { 
                    doc.setTextColor(0, 128, 0); 
                    doc.setFont("helvetica", "bold");
                }
            }
        }
    });
     
   // Mengatur posisi awal teks rincian setelah tabel
    let textY = doc.lastAutoTable.finalY + 6;
    const xVal = 65; // Menyesuaikan jarak titik dua karena font lebih kecil
    
    // --- SETTING HURUF: UKURAN KECIL (8) DAN TIDAK TEBAL (NORMAL) ---
    doc.setTextColor(0, 0, 0); 
    doc.setFont("helvetica", "normal"); // Mengubah dari 'bold' ke 'normal'
    doc.setFontSize(8); // Ukuran diturunkan ke 8 agar tidak dominan

    // --- HANYA MENAMPILKAN RINCIAN KEUANGAN BOP SAMPAI MARGIN ---
    doc.text(`BOP MATERIAL 1 UNIT`, 14, textY);
    doc.text(`: Rp. ${bopMat.toLocaleString('id-ID')}`, xVal, textY);

    textY += 5;
    doc.text(`ONGKOS MOBIL / TRUK`, 14, textY);
    doc.text(`: Rp. ${bopMob.toLocaleString('id-ID')}`, xVal, textY);

    textY += 5;
    doc.text(`TOTAL BOP KESELURUHAN`, 14, textY);
    doc.text(`: Rp. ${totalBopMobil.toLocaleString('id-ID')}`, xVal, textY);

    textY += 5;
    doc.text(`HARGA JUAL KE KONSUMEN`, 14, textY);
    doc.text(`: Rp. ${hargaJualMobil.toLocaleString('id-ID')}`, xVal, textY);

    textY += 5;
    // Pengecekan warna untuk Margin Profit / Sisa (Teks tetap regular/tidak tebal)
    if(marginMobil >= 0) {
        doc.setTextColor(0, 128, 0); // Warna Hijau
        doc.text(`MARGIN KEUNTUNGAN (PROFIT)`, 14, textY);
        doc.text(`: Rp. ${marginMobil.toLocaleString('id-ID')}`, xVal, textY);
    } else {
        doc.setTextColor(255, 0, 0); // Warna Merah
        doc.text(`MARGIN SISA (RUGI/MINUS)`, 14, textY);
        doc.text(`: Rp. ${marginMobil.toLocaleString('id-ID')}`, xVal, textY);
    }

    // --- TANDA TANGAN (TTD) MANAGER ---
    doc.setTextColor(0,0,0);
    let signY = textY + 12; 

    doc.setFont("helvetica", "normal"); 
    doc.setFontSize(10);
    doc.text("Hormat Kami,", 160, signY, { align: "center" });

    signY += 16; 

    doc.setFont("helvetica", "bold"); 
    doc.text("YEFRY DESFIRMANZA", 160, signY, { align: "center", underline: true });

    signY += 5;
    doc.setFont("helvetica", "normal"); 
    doc.text("MANAGER", 160, signY, { align: "center" });

    // Catatan kaki sistem digital (Ikut naik ke atas juga biar rapi)
    const sekarang = new Date();
    const tgl = sekarang.toLocaleDateString('id-ID', { dateStyle: 'medium' });
    const jam = sekarang.toLocaleTimeString('id-ID', { timeStyle: 'short' }).replace('.', ':');
    
    signY += 8;
    doc.setFontSize(7); 
    doc.setFont("helvetica", "italic");
    doc.setTextColor(150, 150, 150); 
    doc.text(`Laporan unit ${item.plat} dibuat otomatis melalui system Digital PT.BBS pada ${tgl} | ${jam}`, 14, signY);

    // Download PDF menggunakan Plat Mobil
    doc.save(`BBS_SURAT_JALAN_${item.plat}.pdf`);
};

        if (v.length > 0) {
            let prefix2 = v.substring(0, 2);
            let splitIdx = duaHuruf.includes(prefix2) ? 2 : 1;

        }
        e.target.value = r;
    });
