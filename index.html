    // --- FUNGSI DURASI ---
    function hitungDurasi(jamM, jamB) {
        if(!jamM || !jamB) return "-";
        
        const jM = jamM.replace('.', ':');
        const jB = jamB.replace('.', ':');
        
        const [h1, m1] = jM.split(':').map(Number);
        const [h2, m2] = jB.split(':').map(Number);
        
        if (isNaN(h1) || isNaN(m1) || isNaN(h2) || isNaN(m2)) return "-";

        let totalMenit = (h2 * 60 + m2) - (h1 * 60 + m1);
        if (totalMenit < 0) totalMenit += 1440; 
        
        const jam = Math.floor(totalMenit / 60);
        const mnt = totalMenit % 60;
        
        return `${jam} jam ${mnt} menit`;
    }

    async function compressAndGetBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 800;
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL("image/jpeg", 0.7).split(',')[1]);
                };
            };
        });
    }

    async function uploadFoto(file, fileName) {
        if(!file) return "";
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('load-txt').innerText = "MENYUSUTKAN FOTO...";
        const base64Sut = await compressAndGetBase64(file);
        document.getElementById('load-txt').innerText = "MENGIRIM DATA (" + fileName.split('_')[0] + ")...";
        try {
            const res = await fetch(GAS_URL, { 
                method: "POST", 
                body: JSON.stringify({ base64: base64Sut, type: "image/jpeg", name: fileName }) 
            });
            const json = await res.json();
            return json.url || "";
        } catch (err) {
            console.error("Gagal Upload:", err);
            return "";
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

window.prosesMuat = async () => {

        document.getElementById('loader').style.display = 'flex';

        // 2. BERSIHKAN EKSTREMI TITIK RUPIAH MENJADI ANGKA MURNI
        const hargaMaterial = Number(rawMaterial.replace(/[^0-9]/g, ''));
        const hargaMobil = Number(rawMobil.replace(/[^0-9]/g, ''));

        const uS = await uploadFoto(fS, `MUAT_${p}.jpg`);

        if(snapOps.val()) {
            Object.values(snapOps.val()).forEach(o => { totalOps += Number(o.nom); });
        }
    }
}

window.prosesTugasSelesai = async () => {
    const firebaseKey = window.currentActiveKey;
    if(!firebaseKey) return alert("TIDAK ADA DATA UNIT YANG TERPILIH!");
    
    const volBongkarInput = document.getElementById('input-vol-bongkar').value;
    const jualRawValue = document.getElementById('input-harga-jual').value;
    const hargaJualInput = Number(jualRawValue.replace(/[^0-9]/g, '')) || 0;
    
    if(!volBongkarInput || !hargaJualInput) {
        return alert("HARAP ISI VOLUME BONGKAR DAN HARGA JUAL KONSUMEN!");
    }
    
    try {
        // 1. Ambil data awal si mobil dari database
        const snap = await get(ref(db, `bbs_logs/${dbKey}/${firebaseKey}`));
        if(!snap.exists()) return alert("Data unit tidak ditemukan!");
        
        const dataMobil = snap.val();
        
        if(!dataMobil.bop_unit) {
            return alert("UNIT INI BELUM MEMILIKI DATA BOP. SELESAIKAN SET BOP TERLEBIH DAHULU!");
        }

        const jamBongkarSkr = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit', hour12: false});
        
        // Hitung margin secara otomatis berdasarkan logika baru
        const totalBopMobil = dataMobil.bop_unit;
        const totalMarginPerUnit = hargaJualInput - totalBopMobil;

        // Gabungkan data inputan baru ke dalam objek mobil untuk dikirim ke fungsi PDF
        dataMobil.volB = Number(volBongkarInput);
        dataMobil.harga_jual = hargaJualInput;
        dataMobil.margin_per_unit = totalMarginPerUnit;
        
        // 2. Update datanya langsung ke database per mobil itu sendiri
        await update(ref(db, `bbs_logs/${dbKey}/${firebaseKey}`), { 
            volB: dataMobil.volB, 
            status: 'OTW', 
            jamB: jamBongkarSkr,
            harga_jual: hargaJualInput,
            margin_per_unit: totalMarginPerUnit
        });
        
        // 3. PANGGIL KODE GENERATE PDF UNTUK 1 UNIT INI
        await window.generatePDF(dataMobil, jamBongkarSkr);
        
        alert("PROSES DATA & CETAK PDF SELESAI!");
        closeOtwManager();

           
        location.reload();
    } catch (e) {
        alert("Gagal memproses data: " + e.message);
    }
};


window.generatePDF = async (item, jamBongkarPasti) => {
    // 1. Ambil data kalkulasi terbaru agar tidak ada nilai yang kosong
    const vMuat = Number(item.volM) || 0;
    const vBongkar = Number(item.volB) || 0;
    const bopMat = Number(item.bop_material) || 0;
    const bopMob = Number(item.bop_mobil) || 0;
    const totalBopMobil = Number(item.bop_unit) || 0;
    const hargaJualMobil = Number(item.harga_jual) || 0;
    const marginMobil = Number(item.margin_per_unit) || 0;

    try {
        // 2. 🚨 SUNTIKAN AMAN: Kita paksa simpan/update ulang data ini ke Firebase dengan status DONE.
        // Ini memastikan meskipun fungsi luar mencoba menghapusnya, data ini langsung ditulis ulang seketika!
        await set(ref(db, `bbs_logs/${dbKey}/${window.currentActiveKey}`), {
            ...item,
            volB: vBongkar,
            harga_jual: hargaJualMobil,
            margin_per_unit: marginMobil,
            status: "DONE", // Tandai sebagai arsip selesai
            jamBongkar: jamBongkarPasti || '--:--'
        });

        alert(`✅ DATA UNIT ${item.plat || ''} BERHASIL DIKUNCI MASUK ARSIP!\nData aman di Firebase & siap ditarik ke laporan global.`);
        
        // 3. Muat ulang halaman agar dashboard bersih menampilkan data terbaru tanpa sisa popup
        // Trik ini sekaligus memotong/menghentikan fungsi remove() bawaan luar yang berjalan setelah fungsi ini.
        location.reload();

    } catch (error) {
        console.error("Gagal mengunci arsip:", error);
    }

    // 💡 KUNCI UTAMA: Kita return 'false' untuk mematahkan script eksekusi hapus data luar.
    return false;
};

window.generatePDFKeseluruhan = async () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4'); 
    
    document.getElementById('load-txt').innerText = "MERAKIT LAPORAN PDF...";
    document.getElementById('loader').style.display = 'flex';

    try {
        // 1. Ambil data dari Firebase
        const snapshot = await get(ref(db, `bbs_logs/${dbKey}`));
        if (!snapshot.exists()) {
            document.getElementById('loader').style.display = 'none';
            return alert("BELUM ADA DATA PENGIRIMAN UNTUK DI-GENERATE!");
        }

        const dataLogs = snapshot.val();
        
        let akumulasiBop = 0;
        let akumulasiJual = 0;
        let akumulasiProfit = 0;
        
        const bodyTableMassal = [];
        let no = 1;

        for (let key in dataLogs) {
            const item = dataLogs[key];
            
            const vMuat = Number(item.volM) || 0;
            const vBongkar = Number(item.volB) || 0;
            const lossLebih = vBongkar - vMuat;
            
            const totalBop = Number(item.bop_unit) || 0;
            const hargaJual = Number(item.harga_jual) || 0;
            const marginProfit = Number(item.margin_per_unit) || 0;

            akumulasiBop += totalBop;
            akumulasiJual += hargaJual;
            akumulasiProfit += marginProfit;

            bodyTableMassal.push([
                no++,
                item.tgl || '-',
                item.plat || '-',
                item.sopir || '-',
                item.project || 'LOSARANG',
                item.barang || '-',
                `${vMuat.toFixed(2)} / ${vBongkar.toFixed(2)}`,
                (lossLebih > 0 ? "+" : "") + lossLebih.toFixed(2),
                `Rp ${totalBop.toLocaleString('id-ID')}`,
                hargaJual > 0 ? `Rp ${hargaJual.toLocaleString('id-ID')}` : '-',
                marginProfit !== 0 ? `Rp ${marginProfit.toLocaleString('id-ID')}` : '-'
            ]);
        }

        // 2. Desain Kop Laporan
        doc.setFontSize(16); doc.setFont("helvetica", "bold");
        doc.text("PT. BERKAH BAJA STEEL", 148, 14, { align: "center" });
        doc.setFontSize(10); doc.setFont("helvetica", "normal");
        doc.text("REKAPITULASI KESELURUHAN DATA PENGIRIMAN & LOGISTIK OPERASIONAL", 148, 20, { align: "center" });
        
        // 3. Render Tabel Laporan Global
        doc.autoTable({
            head: [['NO', 'TANGGAL', 'PLAT NO', 'SOPIR', 'PROJECT', 'BARANG', 'M / B (M3)', '+/-', 'TOTAL BOP', 'HARGA JUAL', 'PROFIT/MARGIN']],
            body: bodyTableMassal,
            startY: 26,
            theme: 'grid',
            styles: { fontSize: 8, halign: 'center', cellPadding: 2 },
            headStyles: { fillColor: [44, 62, 80], fontStyle: 'bold' },
            columnStyles: {
                0: { cellWidth: 10 }, 1: { cellWidth: 22 }, 2: { cellWidth: 25 },
                3: { cellWidth: 25 }, 4: { cellWidth: 25 }, 5: { cellWidth: 25 },
                6: { cellWidth: 22 }, 7: { cellWidth: 15 }, 8: { cellWidth: 28 },
                9: { cellWidth: 28 }, 10: { cellWidth: 30 }
            }
        });

        // 4. Blok Ringkasan Finansial Bawah
        let totalY = doc.lastAutoTable.finalY + 12;
        if (totalY > 170) { doc.addPage(); totalY = 20; }

        doc.setFillColor(245, 247, 250);
        doc.rect(14, totalY, 150, 26, "F"); 
        
        doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.setTextColor(0, 0, 0);
        doc.text("RINGKASAN FINANSIAL KESELURUHAN :", 18, totalY + 6);
        
        doc.setFont("helvetica", "normal"); doc.setFontSize(9);
        doc.text(`• TOTAL BIAYA BOP  :  Rp ${akumulasiBop.toLocaleString('id-ID')}`, 18, totalY + 12);
        doc.text(`• TOTAL HARGA JUAL :  Rp ${akumulasiJual.toLocaleString('id-ID')}`, 18, totalY + 17);
        
        if (akumulasiProfit >= 0) {
            doc.setFillColor(46, 204, 113); doc.rect(14, totalY + 20, 150, 6, "F");
            doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold");
            doc.text(`TOTAL PROFIT / KEUNTUNGAN BERSIH :  Rp ${akumulasiProfit.toLocaleString('id-ID')}`, 18, totalY + 24);
        } else {
            doc.setFillColor(231, 76, 60); doc.rect(14, totalY + 20, 150, 6, "F");
            doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold");
            doc.text(`TOTAL MARGIN SISA (RUGI/MINUS)     :  Rp ${akumulasiProfit.toLocaleString('id-ID')}`, 18, totalY + 24);
        }

        // 5. TTD Manager Kantor
        doc.setTextColor(0, 0, 0);
        doc.setFont("helvetica", "normal"); doc.setFontSize(10);
        doc.text("Hormat Kami,", 245, totalY + 6, { align: "center" });
        doc.setFont("helvetica", "bold");
        doc.text("YEFRY DESFIRMANZA", 245, totalY + 20, { align: "center", underline: true });
        doc.setFont("helvetica", "normal"); doc.setFontSize(9);
        doc.text("MANAGER PT. BBS", 245, totalY + 24, { align: "center" });

        const skrg = new Date();
        doc.setFontSize(7); doc.setFont("helvetica", "italic"); doc.setTextColor(150, 150, 150);
        doc.text(`E-Laporan di-generate massal oleh System Digital PT.BBS pada ${skrg.toLocaleDateString('id-ID')} jam ${skrg.toLocaleTimeString('id-ID')}`, 14, totalY + 33);

        // 6. Eksekusi Download PDF Laporan Rekap Massal
        doc.save(`LAPORAN_GLOBAL_PENGIRIMAN_PT_BBS.pdf`);
        
        // 7. 🔥 DI SINI POP-UP PILIHAN RESET MUNCUL (HANYA SETELAH PDF GLOBAL SELESAI DI-DOWNLOAD)
        setTimeout(async () => {
            if (confirm("PROSES CETAK PDF MASSAL SELESAI!\nApakah Abang ingin sekalian mengosongkan/menghapus semua data pengiriman saat ini dari database Firebase PT. BBS?")) {
                await remove(ref(db, `bbs_logs/${dbKey}`));
                await remove(ref(db, `bbs_operasional/${dbKey}`));
                alert("DATABASE BERHASIL DIKOSONGKAN!");
                location.reload();
            }
        }, 1000);

    } catch (err) {
        alert("Gagal memproses Laporan PDF Keseluruhan: " + err.message);
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
};

document.getElementById('m-plat').addEventListener('input', function (e) {
        let v = e.target.value.toUpperCase().replace(/\s+/g, '');
        let r = "";
        const duaHuruf = ["BE", "BA", "BG", "BH", "BK", "BL", "BM", "BP", "DA", "AB", "AA", "AE", "DE", "DG", "DH", "DK", "DL", "DM", "DN", "DP", "DR", "DS", "DT", "DW", "EA", "EB", "ED", "EE", "EF", "EG", "EH", "EJ", "EK", "EL", "EM", "EN", "EO", "EP", "EQ", "ER", "ES", "ET", "EU", "EV", "EW", "EX", "EY", "EZ", "GA", "GB", "GC", "GD", "GE", "GF", "GG", "GH", "GI", "GJ", "GK", "GL", "GM", "GN", "GO", "GP", "GQ", "GR", "GS", "GT", "GU", "GV", "GW", "GX", "GY", "GZ", "KA", "KB", "KC", "KD", "KE", "KF", "KG", "KH", "KI", "KJ", "KK", "KL", "KM", "KN", "KO", "KP", "KQ", "KR", "KS", "KT", "KU", "KV", "KW", "KX", "KY", "KZ", "PA", "PB", "PC", "PD", "PE", "PF", "PG", "PH", "PI", "PJ", "PK", "PL", "PM", "PN", "PO", "PP", "PQ", "PR", "PS", "PT", "PU", "PV", "PW", "PX", "PY", "PZ"];
        if (v.length > 0) {
            let prefix2 = v.substring(0, 2);
            let splitIdx = duaHuruf.includes(prefix2) ? 2 : 1;
            r += v.substring(0, splitIdx);
            let sisa = v.substring(splitIdx);
            let angkaMatch = sisa.match(/\d+/);
            if (angkaMatch) {
                let angka = angkaMatch[0].substring(0, 4);
                r += " " + angka;
                let seri = sisa.substring(angka.length).replace(/[^A-Z]/g, '');
                if (seri.length > 0) r += " " + seri.substring(0, 3);
            } else if (sisa.length > 0) r += sisa.substring(0, 1).replace(/[^0-9]/g, '');
        }
        e.target.value = r;
    });

    ['m-p', 'm-l', 'm-t'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', () => {
            const p = parseFloat(document.getElementById('m-p').value) || 0;
            const l = parseFloat(document.getElementById('m-l').value) || 0;
            const t = parseFloat(document.getElementById('m-t').value) || 0;
            document.getElementById('m-vol').value = (p * l * t).toFixed(2);
        });
    }); 

function jalankanJam() {
    const skr = new Date();
    document.getElementById('jam-digital').innerHTML = skr.toLocaleTimeString('en-GB');
    const opsi = { day: '2-digit', month: 'short', year: 'numeric' };
    document.getElementById('tgl-digital').innerHTML = skr.toLocaleDateString('id-ID', opsi).toUpperCase();
}
setInterval(jalankanJam, 1000);
jalankanJam();

// --- FUNGSI MASKING FORMAT RIBUAN OTOMATIS SAAT DIKETIK ---
window.formatRupiahOtomatis = (element) => {
    // Ambil angka saja, buang karakter huruf atau simbol lainnya
    let value = element.value.replace(/[^0-9]/g, '');
    
    // Format angka tersebut dengan pemisah ribuan koma (,)
    if (value !== "") {
        element.value = Number(value).toLocaleString('en-US'); // Menggunakan 'en-US' agar pemisahnya berupa tanda koma (,)
    } else {
        element.value = "";
    }
};
    
</script>
